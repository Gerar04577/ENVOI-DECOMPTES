/* ---- localStorage-based shim for window.storage (Claude artifact API) ---- */
if (!window.storage) {
  window.storage = {
    get: async (key) => {
      const v = localStorage.getItem(key);
      return v === null ? null : { key, value: v, shared: false };
    },
    set: async (key, value) => {
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    },
    delete: async (key) => {
      localStorage.removeItem(key);
      return { key, deleted: true, shared: false };
    },
    list: async (prefix) => {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys };
    },
  };
}

/* ---- minimal inline icon set (replaces lucide-react) ---- */

      style={{ display: "inline-block", verticalAlign: "middle" }} {...rest}>
      {children}
    </svg>
  );
}
function Home(p) { return <Icon {...p}><path d="M3 9.5 12 2l9 7.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z" /></Icon>; }
function Building2(p) { return <Icon {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z" /><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2" /><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" /><path d="M10 6h4M10 10h4M10 14h4M10 18h4" /></Icon>; }

/* ---- minimal inline SVG line chart (replaces recharts) ---- */
function EvolutionChart({ readings, dataKey, color, unitLabel }) {
  const data = readings.map(r => ({
    date: r[0], year: r[0] ? r[0].slice(0, 7) : "", value: dataKey === "cost" ? r[4] : r[3],
  })).filter(d => d.date);
  if (data.length < 2) return <div style={{ fontSize: 13, color: MUTED }}>Pas assez de données pour un graphique.</div>;

  const W = 320, H = 160, PAD = 30;
  const values = data.map(d => d.value);
  const minV = Math.min(0, ...values);
  const maxV = Math.max(...values, minV + 1);
  const xStep = (W - PAD * 2) / (data.length - 1);
  const yScale = v => H - PAD - ((v - minV) / (maxV - minV)) * (H - PAD * 2);
  const points = data.map((d, i) => `${PAD + i * xStep},${yScale(d.value)}`).join(" ");
  const [hover, setHover] = useState(null);

  return (
    <div style={{ width: "100%" }}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={180} preserveAspectRatio="none"
        onTouchStart={(e) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const x = (e.touches[0].clientX - rect.left) / rect.width * W;
          const idx = Math.round((x - PAD) / xStep);
          if (idx >= 0 && idx < data.length) setHover(idx);
        }}>
        <line x1={PAD} y1={H - PAD} x2={W - PAD} y2={H - PAD} stroke={LINE} />
        <line x1={PAD} y1={PAD} x2={PAD} y2={H - PAD} stroke={LINE} />
        <text x={2} y={PAD + 4} fontSize="9" fill={MUTED}>{fmtNum(maxV, 0)}</text>
        <text x={2} y={H - PAD + 4} fontSize="9" fill={MUTED}>{fmtNum(minV, 0)}</text>
        <polyline points={points} fill="none" stroke={color} strokeWidth="2" />
        {data.map((d, i) => (
          <circle key={i} cx={PAD + i * xStep} cy={yScale(d.value)} r={hover === i ? 4 : 2.5} fill={color} />
        ))}
        {hover !== null && (
          <text x={Math.min(W - PAD - 40, Math.max(PAD, PAD + hover * xStep - 20))} y={PAD - 6} fontSize="10" fontWeight="700" fill={TEXT}>
            {data[hover].year} · {dataKey === "cost" ? fmtEUR(data[hover].value) : fmtNum(data[hover].value, 0) + " " + unitLabel}
          </text>
        )}
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: MUTED, padding: "0 4px" }}>
        <span>{data[0].year}</span>
        <span>{data[data.length - 1].year}</span>
      </div>
    </div>
  );
}

/* ============================================================
   MINIMAL, SELF-CONTAINED .DOCX BUILDER (real OOXML via JSZip)
   ============================================================ */
function xmlEscape(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");
}

// twips: 1440 per inch
function docxPara(text, opts = {}) {
  const { bold, italic, color, size, align, spacingAfter } = opts;
  const rPr = `${bold ? "<w:b/>" : ""}${italic ? "<w:i/>" : ""}${color ? `<w:color w:val="${color}"/>` : ""}${size ? `<w:sz w:val="${size}"/><w:szCs w:val="${size}"/>` : ""}`;
  const pPr = `${align ? `<w:jc w:val="${align}"/>` : ""}${spacingAfter !== undefined ? `<w:spacing w:after="${spacingAfter}"/>` : ""}`;
  // text may contain simple <b>...</b> markers for inline bold spans
  const runs = String(text).split(/(<b>.*?<\/b>)/g).filter(Boolean).map(part => {
    const isBold = part.startsWith("<b>");
    const clean = xmlEscape(part.replace(/<\/?b>/g, ""));
    const runPr = `${(bold || isBold) ? "<w:b/>" : ""}${italic ? "<w:i/>" : ""}${color ? `<w:color w:val="${color}"/>` : ""}${size ? `<w:sz w:val="${size}"/><w:szCs w:val="${size}"/>` : ""}`;
    return `<w:r>${runPr ? `<w:rPr>${runPr}</w:rPr>` : ""}<w:t xml:space="preserve">${clean}</w:t></w:r>`;
  }).join("");
  return `<w:p>${pPr ? `<w:pPr>${pPr}</w:pPr>` : ""}${runs || `<w:r>${rPr ? `<w:rPr>${rPr}</w:rPr>` : ""}<w:t xml:space="preserve"></w:t></w:r>`}</w:p>`;
}

function docxCell(text, opts = {}) {
  const { bold, color, bg, align = "center", width } = opts;
  const shd = bg ? `<w:shd w:val="clear" w:color="auto" w:fill="${bg}"/>` : "";
  const tcW = width ? `<w:tcW w:w="${width}" w:type="dxa"/>` : `<w:tcW w:w="0" w:type="auto"/>`;
  const vAlign = `<w:vAlign w:val="center"/>`;
  return `<w:tc><w:tcPr>${tcW}${shd}${vAlign}</w:tcPr>${docxPara(text, { bold, color, align, size: 18 })}</w:tc>`;
}

function docxRow(cells) {
  return `<w:tr>${cells.join("")}</w:tr>`;
}

function docxTable(rows, opts = {}) {
  const { widthPct = 5000 } = opts;
  return `<w:tbl><w:tblPr><w:tblW w:w="${widthPct}" w:type="pct"/><w:tblBorders>
    <w:top w:val="single" w:sz="4" w:color="999999"/><w:left w:val="single" w:sz="4" w:color="999999"/>

    <w:insideH w:val="single" w:sz="4" w:color="999999"/><w:insideV w:val="single" w:sz="4" w:color="999999"/>

// Builds the Word document body XML for a décompte.
function buildDecompteDocxXml(buildingName, unitName, tenantName, period, lines, totals) {
  const INK_HEX = "2E4E3F", PAPER_HEX = "F6F2EA", RED_HEX = "C0392B", MUTED_HEX = "8A8478";
  const diffNegative = totals.diff < 0;
  const diffText = (diffNegative ? "-" : "") + fmtEUR(Math.abs(totals.diff));

  const titleTable = docxTable([
    docxRow([
      docxCell(buildingName.toUpperCase(), { bold: true, color: "FFFFFF", bg: INK_HEX }),
      docxCell(unitName.toUpperCase(), { bold: true, color: "FFFFFF", bg: INK_HEX }),
      docxCell((tenantName || "").toUpperCase(), { bold: true, color: "FFFFFF", bg: INK_HEX }),
    ]),
  ]);

  const explanation = [
    docxPara("<b>Veuillez trouver ci-après le tableau reprenant vos consommations d'énergie (mazout, gaz et électricité) et d'eau pour le(s) mois passé(s).</b> Nous attirons votre attention sur la colonne <b>« différence »</b> qui montre, en cas de valeur négative, le dépassement de vos consommations par rapport à vos provisions de charges.", { size: 20, align: "both", spacingAfter: 120 }),
    docxPara("En hiver, il est normal d'avoir une consommation plus élevée. Mais nous vous invitons à faire attention à une trop grande différence, qui vous sera logiquement comptabilisée chaque année ou avant votre départ prématuré éventuel.", { size: 20, align: "both", spacingAfter: 120 }),
    docxPara("Les taxes poubelles et le Wifi, pour les locataires concernés, ne sont bien évidemment pas comptabilisés dans votre provision de charges, puisque ce décompte ne concerne que le calcul de l'énergie et de l'eau.", { size: 20, align: "both", spacingAfter: 200 }),
  ].join("");

  const headerRow = docxRow([
    docxCell(period, { bold: true, color: "FFFFFF", bg: INK_HEX, align: "left" }),
    docxCell("Consommation", { bold: true, color: "FFFFFF", bg: INK_HEX }),
    docxCell("Coût (€)", { bold: true, color: "FFFFFF", bg: INK_HEX }),
    docxCell("Jours", { bold: true, color: "FFFFFF", bg: INK_HEX }),
    docxCell("Total charges", { bold: true, color: "FFFFFF", bg: INK_HEX }),
    docxCell("Provision", { bold: true, color: "FFFFFF", bg: INK_HEX }),
    docxCell("Différence", { bold: true, color: "FFFFFF", bg: INK_HEX }),
  ]);

  const dataRows = lines.map(l => docxRow([
    docxCell(l.label, { bold: true, align: "left" }),
    docxCell(String(l.conso ?? "")),
    docxCell(String(l.cost ?? "")),
    docxCell(String(l.days ?? "")),
    docxCell(l.totalCell || ""),
    docxCell(l.provCell || ""),
    docxCell(l.diffCell || "", { color: l.diffCell ? (l.diffCell.startsWith("-") ? RED_HEX : undefined) : undefined }),
  ]));

  const totalRow = docxRow([
    docxCell("Différence Totale", { bold: true, bg: PAPER_HEX, align: "left", width: 6000 }),
    docxCell("", { bg: PAPER_HEX }), docxCell("", { bg: PAPER_HEX }), docxCell("", { bg: PAPER_HEX }),
    docxCell("", { bg: PAPER_HEX }), docxCell("", { bg: PAPER_HEX }),
    docxCell(diffText, { bold: true, bg: PAPER_HEX, color: diffNegative ? RED_HEX : undefined }),
  ]);

  const chargesTable = docxTable([headerRow, ...dataRows, totalRow]);

  const footer = [
    docxPara("Un solde négatif (en rouge) correspond à un dépassement de consommation à régulariser. Un solde positif est en faveur du locataire.", { italic: true, size: 16, color: MUTED_HEX, spacingAfter: 60 }),
    docxPara(`Document établi le ${fmtDate(todayISO())}`, { italic: true, size: 16, color: MUTED_HEX }),
  ].join("");

  return `${titleTable}${docxPara("", { spacingAfter: 120 })}${explanation}${chargesTable}${docxPara("", { spacingAfter: 60 })}${footer}`;
}

async function buildDocxBlob(buildingName, unitName, tenantName, period, lines, totals) {
  const bodyXml = buildDecompteDocxXml(buildingName, unitName, tenantName, period, lines, totals);
  const documentXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">

</w:document>`;

  const zip = new window.JSZip();
  zip.file("[Content_Types].xml", DOCX_CONTENT_TYPES);
  zip.folder("_rels").file(".rels", DOCX_RELS);
  zip.folder("word").file("document.xml", documentXml);
  zip.folder("word").file("styles.xml", DOCX_STYLES);
  zip.folder("word/_rels").file("document.xml.rels", DOCX_DOCUMENT_RELS);
  zip.folder("docProps").file("core.xml", DOCX_CORE);
  zip.folder("docProps").file("app.xml", DOCX_APP);

  return zip.generateAsync({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
}

const fmtEUR = (n) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return n.toLocaleString("fr-BE", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
};
const fmtNum = (n, d = 0) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return n.toLocaleString("fr-BE", { minimumFractionDigits: d, maximumFractionDigits: d });
};
const fmtDate = (iso) => {
  if (!iso) return "—";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
};
const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);
const todayISO = () => new Date().toISOString().slice(0, 10);

const TYPE_ICON = { elec: Zap, eau: Droplet, gaz: Flame };

function deriveTariffs(meters, building) {
  const t = { eau: 6.5, elecJour: 0.6, elecNuit: 0.6, gaz: 0.6, studentEau: 6.5, studentElec: 0.6 };
  meters.filter(m => m.building === building).forEach(m => {
    const last = m.readings[m.readings.length - 1];
    if (!last) return;
    const rate = last[2];
    if (m.type === "eau" && rate) t.eau = rate;
    if (m.type === "elec" && m.subtype !== "nuit" && rate) t.elecJour = rate;
    if (m.type === "elec" && m.subtype === "nuit" && rate) t.elecNuit = rate;
    if (m.type === "gaz" && rate) t.gaz = rate;
  });
  t.studentEau = t.eau;
  t.studentElec = t.elecJour;
  return t;
}

function lastInterval(readings) {
  if (!readings || readings.length < 2) return null;
  const prev = readings[readings.length - 2];
  const last = readings[readings.length - 1];
  return {
    fromDate: prev[0], toDate: last[0], fromIndex: prev[1], toIndex: last[1],
    rate: last[2], conso: last[3], cost: last[4], days: last[5],
  };
}

function unitMeters(meters, building, unitId, scope = "unit") {
  return meters.filter(m => m.building === building && m.scope === scope && m.unit === unitId);
}

function decompteFilename(buildingName, unitName, period, ext) {
  return `Decompte_${buildingName}_${unitName}_${period.replace(/[\\/ ]/g, "-")}.${ext}`
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^A-Za-z0-9._-]/g, "_");
}

async function buildDecompteBlob(buildingName, unitName, tenantName, period, lines, totals, html) {
  // Real .docx via our hand-rolled OOXML builder (standalone build, JSZip loaded).
  if (typeof window !== "undefined" && window.JSZip && typeof buildDocxBlob === "function") {
    try {
      const blob = await buildDocxBlob(buildingName, unitName, tenantName, period, lines, totals);
      return { blob, ext: "docx", mime: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" };
    } catch (e) {
      // fall through to legacy HTML-as-.doc
    }
  }
  return { blob: new Blob(["\ufeff", html], { type: "application/msword" }), ext: "doc", mime: "application/msword" };
}

// Primary: native share sheet (works in Safari + standalone PWA on iOS/iPadOS,
// lets the person save the file to Files, AirDrop it, or open it in Word).
async function shareDecompteDoc(buildingName, unitName, tenantName, period, lines, totals) {
  const html = buildDecompteHtml(buildingName, unitName, tenantName, period, lines, totals);
  const { blob, ext, mime } = await buildDecompteBlob(buildingName, unitName, tenantName, period, lines, totals, html);
  const filename = decompteFilename(buildingName, unitName, period, ext);
  const file = new File([blob], filename, { type: mime });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file] });
      return true;
    } catch (e) {
      return false; // user cancelled, or share failed
    }
  }
  return false;
}

// Fallback: classic blob download (works in desktop browsers; unreliable in iOS standalone apps).
async function downloadDecompteDoc(buildingName, unitName, tenantName, period, lines, totals) {
  const html = buildDecompteHtml(buildingName, unitName, tenantName, period, lines, totals);
  const { blob, ext } = await buildDecompteBlob(buildingName, unitName, tenantName, period, lines, totals, html);
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = decompteFilename(buildingName, unitName, period, ext);
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function App() {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [building, setBuilding] = useState("biche");
  const [loaded, setLoaded] = useState(false);

  // Ensure a sensible mobile viewport (the standalone HTML build already sets
  // this in <head>; this is a harmless fallback when run inside an embedded
  // preview that doesn't provide one).
  useEffect(() => {
    let meta = document.querySelector('meta[name="viewport"]');
    if (!meta) {
      meta = document.createElement("meta");
      meta.name = "viewport";
      meta.setAttribute("content", "width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover");
      document.head.appendChild(meta);
    }
  }, []);

  useEffect(() => {
    (async () => {
      try {
        // ?reset in URL clears stored data and reloads from seed (emergency recovery)
        if (window.location.search.includes("reset")) {
          await window.storage.delete("charges-data").catch(() => {});
          setData(JSON.parse(JSON.stringify(SEED)));
          setLoaded(true);
          return;
        }
        const res = await window.storage.get("charges-data");
        if (res && res.value) {
          setData(JSON.parse(res.value));
        } else {
          setData(JSON.parse(JSON.stringify(SEED)));
        }
      } catch (e) {
        setData(JSON.parse(JSON.stringify(SEED)));
      }
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (!loaded || !data) return;
    window.storage.set("charges-data", JSON.stringify(data)).catch(() => {});
  }, [data, loaded]);

  if (!data) {
    return (
      <div className="app-root" style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh" }}>
        <GlobalStyle />
        <div style={{ color: MUTED }}>Chargement…</div>
      </div>
    );
  }

  const buildings = data.buildings;
  const currentBuilding = buildings.find(b => b.id === building);

  return (
    <div className="app-root">
      <GlobalStyle />
      <TopBar tab={tab} />
      {(tab === "buildings" || tab === "meters" || tab === "decomptes") && (
        <div className="seg">
          {buildings.map(b => (
            <button key={b.id} className={`segbtn ${building === b.id ? "active" : ""}`} onClick={() => setBuilding(b.id)}>
              {b.name}
            </button>
          ))}
        </div>
      )}
      <div className="content">
        {tab === "dashboard" && <Dashboard data={data} setData={setData} onGo={(b, t) => { setBuilding(b); setTab(t); }} />}
        {tab === "buildings" && <BuildingsView data={data} setData={setData} building={building} />}
        {tab === "meters" && <MetersView data={data} setData={setData} building={building} />}
        {tab === "decomptes" && <DecomptesView data={data} setData={setData} building={building} />}
        {tab === "search" && <SearchView data={data} onGo={(b, t) => { setBuilding(b); setTab(t); }} />}
      </div>
      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

/* ============================================================
   BACKUP / SYNC (export & import full dataset as JSON, e.g. via OneDrive)
   ============================================================ */
function BackupBar({ data, setData }) {
  const [msg, setMsg] = useState(null); // { type: "ok"|"err", text }
  const [busy, setBusy] = useState(false);
  const fileInputRef = useRef(null);

  const flash = (type, text) => {
    setMsg({ type, text });
    setTimeout(() => setMsg(null), 4000);
  };

  const exportData = async () => {
    setBusy(true);
    try {
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const filename = "charges-data.json";
      const file = new File([blob], filename, { type: "application/json" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file] });
          flash("ok", "✓ Sauvegarde exportée");
        } catch (e) {
          // user cancelled the share sheet — not an error
        }
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        flash("ok", "✓ Sauvegarde téléchargée");
      }
    } catch (e) {
      flash("err", "Erreur lors de l'export : " + e.message);
    } finally {
      setBusy(false);
    }
  };

  const syncOneDrive = async () => {
    setBusy(true);
    try {
      const json = JSON.stringify(data, null, 2);
      const base64 = btoa(unescape(encodeURIComponent(json)));
      const response = await fetch("https://hook.eu1.make.com/pya67pi1a9tsccwgssa7pieib9wa5438", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "save", data: base64 })
      });
      if (response.ok) {
        flash("ok", "✓ Sauvegarde automatique OneDrive réussie");
      } else {
        flash("err", "Erreur Make.com : " + response.status);
      }
    } catch (e) {
      flash("err", "Erreur de connexion : " + e.message);
    } finally {
      setBusy(false);
    }
  };

  const importOneDrive = async () => {
    setBusy(true);
    try {
      const response = await fetch("https://hook.eu1.make.com/pya67pi1a9tsccwgssa7pieib9wa5438", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "import" })
      });
      if (!response.ok) { flash("err", "Erreur Make.com : " + response.status); return; }
      const text = await response.text();
      const parsed = JSON.parse(text);
      if (!parsed.buildings || !parsed.meters) throw new Error("Format de fichier inattendu");
      setData(parsed);
      flash("ok", "✓ Importation automatique OneDrive réussie");
    } catch (e) {
      flash("err", "Erreur d'importation : " + e.message);
    } finally {
      setBusy(false);
    }
  };

  const importData = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    setBusy(true);
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(String(reader.result));
        if (!parsed.buildings || !parsed.meters) throw new Error("Format de fichier inattendu");
        setData(parsed);
        flash("ok", "✓ Données importées");
      } catch (err) {
        flash("err", "Fichier invalide : " + err.message);
      } finally {
        setBusy(false);
        e.target.value = "";
      }
    };
    reader.onerror = () => { flash("err", "Impossible de lire le fichier"); setBusy(false); };
    reader.readAsText(f);
  };

  return (
    <div className="card">
      <div style={{ fontWeight: 700, marginBottom: 8 }}>Sauvegarde & synchronisation</div>
      <div style={{ fontSize: 12, color: MUTED, marginBottom: 10 }}>
        <b>Sauvegarde manuelle</b> : exporte le fichier via la feuille de partage iOS (OneDrive, etc.).<br/>
        <b>Sauvegarde automatique</b> : envoie directement vers OneDrive via Make.com en un clic.<br/>
        <b>Importation automatique</b> : récupère directement depuis OneDrive via Make.com en un clic.
      </div>
      <div className="row" style={{ flexWrap: "wrap" }}>
        <button className="btn btn-primary" onClick={exportData} disabled={busy}>
          <Download size={15} /> Sauvegarde manuelle OneDrive
        </button>
        <button className="btn btn-primary" onClick={syncOneDrive} disabled={busy} style={{ background: "linear-gradient(135deg,#4f6ef7,#7c3aed)", border: "none" }}>
          ☁️ Sauvegarde automatique OneDrive
        </button>
        <button className="btn btn-primary" onClick={importOneDrive} disabled={busy} style={{ background: "linear-gradient(135deg,#16a34a,#15803d)", border: "none" }}>
          ☁️ Importation automatique OneDrive
        </button>
        <button className="btn btn-ghost" onClick={() => fileInputRef.current?.click()} disabled={busy}>
          <Save size={15} /> Importation manuelle (fichier)
        </button>
        <input ref={fileInputRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={importData} />
      </div>
      {msg && (
        <div style={{ marginTop: 8, fontSize: 13, fontWeight: 700, color: msg.type === "ok" ? INK : RED }}>
          {msg.text}
        </div>
      )}
    </div>
  );
}

function BuildingsView({ data, setData, building }) {
  const b = data.buildings.find(x => x.id === building);
  const [editingTariffs, setEditingTariffs] = useState(true);
  const [editingStudentTariffs, setEditingStudentTariffs] = useState(true);
  const tariffs = data.tariffs?.[building] || deriveTariffs(data.meters, building);

  const updateUnit = (unitId, patch) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const bb = next.buildings.find(x => x.id === building);
      const u = bb.units.find(x => x.id === unitId);
      Object.assign(u, patch);
      return next;
    });
  };

  const addTenantChange = (unitId, name) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const bb = next.buildings.find(x => x.id === building);
      const u = bb.units.find(x => x.id === unitId);
      if (!u.history) u.history = [];
      // close previous tenant period
      if (u.history.length) u.history[u.history.length - 1].end = todayISO();
      u.history.push({ tenant: name, start: todayISO(), end: null });
      u.tenant = name;
      return next;
    });
  };

  const updateTariff = (key, value) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next.tariffs) next.tariffs = {};
      if (!next.tariffs[building]) next.tariffs[building] = deriveTariffs(next.meters, building);
      next.tariffs[building][key] = parseFloat(value) || 0;
      return next;
    });
  };

  return (
    <div>
      <div className="card">
        <div className="between" onClick={() => setEditingTariffs(v => !v)} style={{ cursor: "pointer" }}>
          <div style={{ fontWeight: 700 }}>Tarifs — Propriétaire ({b.name})</div>
          {editingTariffs ? <ChevronDown size={18} /> : <ChevronRight size={18} />}
        </div>
        {editingTariffs && (
          <>
            <div style={{ fontSize: 12, color: MUTED, margin: "8px 0" }}>
              Tarifs réels payés par le propriétaire (factures), utilisés pour le Bilan et les ajustements des compteurs généraux.
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <div>
                <span className="label">Eau (€/m³)</span>
                <input type="number" step="0.01" defaultValue={tariffs.eau} onBlur={e => updateTariff("eau", e.target.value)} />
              </div>
              <div>
                <span className="label">Élec jour (€/kWh)</span>
                <input type="number" step="0.01" defaultValue={tariffs.elecJour} onBlur={e => updateTariff("elecJour", e.target.value)} />
              </div>
              <div>
                <span className="label">Élec nuit (€/kWh)</span>
                <input type="number" step="0.01" defaultValue={tariffs.elecNuit} onBlur={e => updateTariff("elecNuit", e.target.value)} />
              </div>
              {building === "ptg" && (
                <div>
                  <span className="label">Gaz (€/m³)</span>
                  <input type="number" step="0.01" defaultValue={tariffs.gaz} onBlur={e => updateTariff("gaz", e.target.value)} />
                </div>
              )}
            </div>
          </>
        )}
      </div>

      <div className="card">
        <div className="between" onClick={() => setEditingStudentTariffs(v => !v)} style={{ cursor: "pointer" }}>
          <div style={{ fontWeight: 700 }}>Tarifs — Étudiants ({b.name})</div>
          {editingStudentTariffs ? <ChevronDown size={18} /> : <ChevronRight size={18} />}
        </div>
        {editingStudentTariffs && (
          <>
            <div style={{ fontSize: 12, color: MUTED, margin: "8px 0" }}>
              Tarifs facturés aux locataires dans les décomptes — un seul tarif électricité (pas de
              distinction jour/nuit). Le gaz n'est pas facturé ici (couvert par ISTA).
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <div>
                <span className="label">Eau (€/m³)</span>
                <input type="number" step="0.01" defaultValue={tariffs.studentEau} onBlur={e => updateTariff("studentEau", e.target.value)} />
              </div>
              <div>
                <span className="label">Électricité (€/kWh)</span>
                <input type="number" step="0.01" defaultValue={tariffs.studentElec} onBlur={e => updateTariff("studentElec", e.target.value)} />
              </div>
            </div>
          </>
        )}
      </div>

      {b.units.map(u => (
        <UnitCard key={u.id} unit={u} onUpdate={(patch) => updateUnit(u.id, patch)} onTenantChange={(name) => addTenantChange(u.id, name)} />
      ))}
    </div>
  );
}

function sumLastInterval(meters) {
  let conso = 0, cost = 0, n = 0;
  meters.forEach(m => {
    const li = lastInterval(m.readings);
    if (li) { conso += li.conso; cost += li.cost; n++; }
  });
  return { conso, cost, n };
}

function getAdjustment(data, building, type) {
  const a = data.adjustments?.[building]?.[type];
  return a || { mode: "none", factor: 1 };
}

function BilanRow({ label, gen, ind, unit, adjustment }) {
  const diffConso = gen.conso - ind.conso;
  const diffCost = gen.cost - ind.cost;
  const offColor = Math.abs(diffCost) > Math.max(5, gen.cost * 0.05) ? RED : INK;
  const adjusted = adjustment && adjustment.mode !== "none";
  const f = adjustment ? adjustment.factor : 1;
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontWeight: 700, marginBottom: 6 }}>{label}</div>
      <div className="scrollx">
        <table className="tbl">
          <thead><tr><th></th><th>Conso. ({unit})</th><th>Coût</th></tr></thead>
          <tbody>
            <tr><td>Compteurs généraux ({gen.n})</td><td>{fmtNum(gen.conso, 1)}</td><td>{fmtEUR(gen.cost)}</td></tr>
            <tr><td>Compteurs individuels ({ind.n})</td><td>{fmtNum(ind.conso, 1)}</td><td>{fmtEUR(ind.cost)}</td></tr>
            <tr style={{ fontWeight: 700 }}>
              <td>Écart</td>
              <td style={{ color: offColor }}>{fmtNum(diffConso, 1)}</td>
              <td style={{ color: offColor }}>{fmtEUR(diffCost)}</td>
            </tr>
            {adjusted && (
              <tr style={{ color: ACCENT, fontWeight: 700 }}>
                <td>Après ajustement ({adjustment.mode === "price" ? "prix" : "consommation"})</td>
                <td>{fmtNum(ind.conso * (adjustment.mode === "conso" ? f : 1), 1)}</td>
                <td>{fmtEUR(ind.cost * f)}</td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AdjustmentBlock({ data, setData, building, type, gen, ind, label, unitLabel, nUnits, onShowReport }) {
  const adjustment = getAdjustment(data, building, type);
  const diffCost = gen.cost - ind.cost;
  const diffConso = gen.conso - ind.conso;
  const significant = ind.cost > 0 && Math.abs(diffCost) > Math.max(5, gen.cost * 0.05);
  const coverage = nUnits > 0 ? ind.n / nUnits : 0;
  const lowCoverage = coverage < 0.4;

  const priceFactor = ind.cost > 0 ? gen.cost / ind.cost : 1;
  const consoFactor = ind.conso > 0 ? gen.conso / ind.conso : 1;

  const apply = (mode, factor) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next.adjustments) next.adjustments = {};
      if (!next.adjustments[building]) next.adjustments[building] = {};
      next.adjustments[building][type] = { mode, factor };
      return next;
    });
  };
  const reset = () => apply("none", 1);

  if (!significant && adjustment.mode === "none") return null;

  if (lowCoverage) {
    return (
      <div style={{ marginBottom: 14, padding: 10, background: PAPER, borderRadius: 10 }}>
        <div style={{ fontWeight: 700, marginBottom: 4 }}>{label}</div>
        <div style={{ fontSize: 13, color: MUTED }}>
          Seuls {ind.n} logement(s) sur {nUnits} ont un compteur individuel pour ce poste —
          comparer leur somme au compteur général n'a pas de sens (la majorité des logements
          ne sont pas couverts). Pas d'ajustement automatique proposé ici ; utilisez la quote-part
          manuelle ou les factures ISTA dans "Décomptes" pour les logements sans compteur.
        </div>
        {adjustment.mode !== "none" && (
          <button className="btn btn-ghost" style={{ marginTop: 8 }} onClick={reset}><X size={14} /> Annuler l'ajustement existant</button>
        )}
      </div>
    );
  }

  const sign = diffCost < 0 ? "supérieure" : "inférieure";

  return (
    <div style={{ marginBottom: 14, padding: 10, background: PAPER, borderRadius: 10 }}>
      <div style={{ fontWeight: 700, marginBottom: 4 }}>{label}</div>
      <div style={{ fontSize: 13, color: MUTED, marginBottom: 8, lineHeight: 1.5 }}>
        Le compteur général indique <b>{fmtEUR(gen.cost)}</b> ({fmtNum(gen.conso, 1)} {unitLabel}).
        La somme des {ind.n} compteurs individuels donne <b>{fmtEUR(ind.cost)}</b> ({fmtNum(ind.conso, 1)} {unitLabel}) —
        une somme {sign} de {fmtEUR(Math.abs(diffCost))}.
      </div>
      <div style={{ fontSize: 13, marginBottom: 8, lineHeight: 1.6 }}>
        <b>Choisissez comment répartir cet écart sur les logements :</b>
        <ul style={{ margin: "6px 0 0 0", paddingLeft: 18 }}>
          <li style={{ marginBottom: 4 }}>
            <b>Ajuster le prix</b> : on garde la consommation de chaque compteur telle que relevée,
            mais on multiplie son coût par <b>{fmtNum(priceFactor, 3)}</b> (= {fmtEUR(gen.cost)} ÷ {fmtEUR(ind.cost)}).
            Résultat : la somme des coûts individuels redevient {fmtEUR(gen.cost)}, identique au général.
          </li>
          <li>
            <b>Ajuster la consommation</b> : on multiplie consommation ET coût de chaque compteur par <b>{fmtNum(consoFactor, 3)}</b>
            (= {fmtNum(gen.conso, 1)} ÷ {fmtNum(ind.conso, 1)} {unitLabel}). Résultat : la somme des consommations
            individuelles redevient {fmtNum(gen.conso, 1)} {unitLabel}, comme si chaque locataire avait consommé un peu
            plus (ou moins).
          </li>
        </ul>
      </div>
      <div className="row" style={{ flexWrap: "wrap" }}>
        <button className={`btn ${adjustment.mode === "price" ? "btn-primary" : "btn-ghost"}`} onClick={() => apply("price", priceFactor)}>
          Ajuster le prix (×{fmtNum(priceFactor, 3)})
        </button>
        <button className={`btn ${adjustment.mode === "conso" ? "btn-primary" : "btn-ghost"}`} onClick={() => apply("conso", consoFactor)}>
          Ajuster la consommation (×{fmtNum(consoFactor, 3)})
        </button>
        {adjustment.mode !== "none" && (
          <button className="btn btn-ghost" onClick={reset}><X size={14} /> Annuler</button>
        )}
      </div>
      <div style={{ fontSize: 12, color: adjustment.mode !== "none" ? ACCENT : MUTED, marginTop: 8, fontWeight: adjustment.mode !== "none" ? 700 : 400 }}>
        {adjustment.mode === "price" && `Actif : chaque logement voit son coût ${type} multiplié par ${fmtNum(priceFactor, 3)} dans les décomptes.`}
        {adjustment.mode === "conso" && `Actif : chaque logement voit sa consommation et son coût ${type} multipliés par ${fmtNum(consoFactor, 3)} dans les décomptes.`}
        {adjustment.mode === "none" && "Aucun ajustement appliqué — les décomptes utilisent les valeurs brutes des compteurs individuels."}
      </div>
      <button className="btn btn-ghost" style={{ marginTop: 8 }} onClick={() => onShowReport(type)}>
        <FileText size={14} /> Voir le rapport détaillé (impression / PDF)
      </button>
    </div>
  );
}

function BilanCard({ data, setData, building, onShowReport }) {
  const b = data.buildings.find(x => x.id === building);
  const meters = data.meters.filter(m => m.building === building);
  const general = meters.filter(m => m.scope === "general");
  const units = meters.filter(m => m.scope === "unit");

  const genElecMeters = general.filter(m => m.type === "elec");
  const indElecMeters = units.filter(m => m.type === "elec");
  const genEauMeters = general.filter(m => m.type === "eau");
  const indEauMeters = units.filter(m => m.type === "eau");

  const genElec = sumLastInterval(genElecMeters);
  const indElec = sumLastInterval(indElecMeters);
  const genEau = sumLastInterval(genEauMeters);
  const indEau = sumLastInterval(indEauMeters);
  const genGaz = general.filter(m => m.type === "gaz");
  const gazSum = sumLastInterval(genGaz);

  const generalCount = { elec: genElecMeters.length, eau: genEauMeters.length, gaz: genGaz.length };
  const nUnits = b.units.length;

  return (
    <div className="card">
      <div style={{ fontWeight: 700, marginBottom: 4 }}>Bilan — compteurs généraux vs individuels</div>
      <div style={{ fontSize: 12, color: MUTED, marginBottom: 12 }}>
        Comparaison sur la dernière période relevée pour chaque compteur. Un écart important (en{" "}
        <span style={{ color: RED, fontWeight: 700 }}>rouge</span>) peut indiquer une fuite, un vol, ou un relevé manquant.
      </div>

      <BilanRow label={`Électricité (${generalCount.elec} compteur(s) général/aux)`} gen={genElec} ind={indElec} unit="kWh" adjustment={getAdjustment(data, building, "elec")} />
      <AdjustmentBlock data={data} setData={setData} building={building} type="elec" gen={genElec} ind={indElec} label="Ajustement Électricité" unitLabel="kWh" nUnits={nUnits} onShowReport={onShowReport} />

      <BilanRow label={`Eau (${generalCount.eau} compteur(s) général/aux)`} gen={genEau} ind={indEau} unit="m³" adjustment={getAdjustment(data, building, "eau")} />
      <AdjustmentBlock data={data} setData={setData} building={building} type="eau" gen={genEau} ind={indEau} label="Ajustement Eau" unitLabel="m³" nUnits={nUnits} onShowReport={onShowReport} />

      {genGaz.length > 0 && (
        <div>
          <div style={{ fontWeight: 700, marginBottom: 6 }}>Gaz / chauffage (compteur général)</div>
          <div style={{ fontSize: 13 }}>
            Dernière période : <b>{fmtNum(gazSum.conso, 1)} m³</b> — <b>{fmtEUR(gazSum.cost)}</b>
          </div>
          <div style={{ fontSize: 12, color: MUTED, marginTop: 4 }}>
            Pas de compteur individuel — ce coût est réparti via la quote-part saisie dans "Décomptes" (ou les factures ISTA).
          </div>
        </div>
      )}
    </div>
  );
}

function ReportView({ data, building, type, onClose }) {
  const b = data.buildings.find(x => x.id === building);
  const meters = data.meters.filter(m => m.building === building && m.type === type);
  const general = meters.filter(m => m.scope === "general");
  const units = meters.filter(m => m.scope === "unit");
  const gen = sumLastInterval(general);
  const ind = sumLastInterval(units);
  const diffConso = gen.conso - ind.conso;
  const diffCost = gen.cost - ind.cost;
  const adjustment = getAdjustment(data, building, type);
  const priceFactor = ind.cost > 0 ? gen.cost / ind.cost : 1;
  const consoFactor = ind.conso > 0 ? gen.conso / ind.conso : 1;
  const typeLabel = TYPE_LABEL[type] || type;

  const meterRow = (m) => {
    const li = lastInterval(m.readings);
    const unitName = m.unit ? (b.units.find(u => u.id === m.unit)?.name || m.unit) : "—";

  return (

      <style>{`

        <button className="btn btn-ghost" onClick={onClose}><ArrowLeft size={15} /> Retour</button>

      </div>

      <div className="display" style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>
        Rapport d'écart — {typeLabel}
      </div>
      <div style={{ fontSize: 13, color: MUTED, marginBottom: 16 }}>
        {b.name} · établi le {fmtDate(todayISO())}
      </div>

      <div className="card">
        <div style={{ fontWeight: 700, marginBottom: 8 }}>1. Compteurs généraux ({general.length})</div>
        <div className="scrollx">
          <table className="tbl">
            <thead><tr><th>Logement</th><th>Compteur</th><th>Du</th><th>Au</th><th>Conso.</th><th>Coût</th></tr></thead>
            <tbody>{general.map(meterRow)}</tbody>
            <tfoot><tr style={{ fontWeight: 700 }}><td colSpan={4}>Total général</td><td>{fmtNum(gen.conso, 1)}</td><td>{fmtEUR(gen.cost)}</td></tr></tfoot>
          </table>
        </div>
      </div>

      <div className="card">
        <div style={{ fontWeight: 700, marginBottom: 8 }}>2. Compteurs individuels ({units.length})</div>
        <div className="scrollx">
          <table className="tbl">
            <thead><tr><th>Logement</th><th>Compteur</th><th>Du</th><th>Au</th><th>Conso.</th><th>Coût</th></tr></thead>
            <tbody>{units.map(meterRow)}</tbody>
            <tfoot><tr style={{ fontWeight: 700 }}><td colSpan={4}>Total individuels</td><td>{fmtNum(ind.conso, 1)}</td><td>{fmtEUR(ind.cost)}</td></tr></tfoot>
          </table>
        </div>
      </div>

      <div className="card">
        <div style={{ fontWeight: 700, marginBottom: 8 }}>3. Écart constaté</div>
        <p style={{ fontSize: 14, lineHeight: 1.6 }}>
          Le ou les compteurs généraux totalisent <b>{fmtNum(gen.conso, 1)} {type === "elec" ? "kWh" : "m³"}</b> pour
          un coût de <b>{fmtEUR(gen.cost)}</b> sur la dernière période relevée.
          La somme des {units.length} compteurs individuels donne <b>{fmtNum(ind.conso, 1)} {type === "elec" ? "kWh" : "m³"}</b>
          pour <b>{fmtEUR(ind.cost)}</b>.
        </p>
        <p style={{ fontSize: 14, lineHeight: 1.6 }}>
          Écart : <b style={{ color: Math.abs(diffCost) > 5 ? RED : INK }}>{fmtNum(diffConso, 1)} {type === "elec" ? "kWh" : "m³"}</b> et{" "}
          <b style={{ color: Math.abs(diffCost) > 5 ? RED : INK }}>{fmtEUR(diffCost)}</b>.
          {diffCost > 0
            ? " Le compteur général est supérieur à la somme des individuels (pertes communes, parties communes non comptées individuellement, ou relevé individuel manquant/sous-estimé)."
            : " La somme des compteurs individuels est supérieure au compteur général (relevé général en retard, tarif différent, ou double comptage)."}
        </p>

      <div className="card">

        <p style={{ fontSize: 14, lineHeight: 1.6 }}>

          Chaque logement voit son coût {typeLabel.toLowerCase()} multiplié par {fmtNum(priceFactor, 4)}, sans changer sa consommation affichée.
        </p>
        <p style={{ fontSize: 14, lineHeight: 1.6 }}>
          <b>Option B — Ajuster la consommation</b> : facteur = consommation générale ÷ consommation individuelle = {fmtNum(gen.conso, 1)} ÷ {fmtNum(ind.conso, 1)} = <b>{fmtNum(consoFactor, 4)}</b>.
          Chaque logement voit sa consommation ET son coût {typeLabel.toLowerCase()} multipliés par {fmtNum(consoFactor, 4)}.
        </p>
        <p style={{ fontSize: 14, lineHeight: 1.6, fontWeight: 700, color: adjustment.mode !== "none" ? ACCENT : MUTED }}>
          {adjustment.mode === "none" && "Aucune option n'est actuellement appliquée dans l'application."}
          {adjustment.mode === "price" && `L'option A (prix, facteur ${fmtNum(adjustment.factor, 4)}) est actuellement appliquée dans les décomptes.`}
          {adjustment.mode === "conso" && `L'option B (consommation, facteur ${fmtNum(adjustment.factor, 4)}) est actuellement appliquée dans les décomptes.`}
        </p>
      </div>
    </div>
  );
}

function MeterDetail({ data, setData, meter, onBack }) {
  const [showForm, setShowForm] = useState(false);
  const last = meter.readings[meter.readings.length - 1];
  const [newDate, setNewDate] = useState(todayISO());
  const [newIndex, setNewIndex] = useState("");
  const [newRate, setNewRate] = useState(last ? last[2] : "");

  const conso = newIndex !== "" && last ? (parseFloat(newIndex) - last[1]) : null;
  const days = last ? daysBetween(last[0], newDate) : null;
  const cost = conso !== null && newRate !== "" ? conso * parseFloat(newRate) : null;

  // Previous period (the interval ending at `last`), for the ±20% comparison.
  const prevPeriod = meter.readings.length >= 2 ? meter.readings[meter.readings.length - 2] : null;
  const prevConsoPerDay = prevPeriod && last && last[5] ? last[3] / last[5] : null;
  const newConsoPerDay = conso !== null && days ? conso / days : null;
  let consoAlertPct = null;
  if (prevConsoPerDay !== null && prevConsoPerDay > 0 && newConsoPerDay !== null) {
    consoAlertPct = ((newConsoPerDay - prevConsoPerDay) / prevConsoPerDay) * 100;
  }
  const consoAlert = consoAlertPct !== null && Math.abs(consoAlertPct) >= 20 ? consoAlertPct : null;

  const [lastAlert, setLastAlert] = useState(null);

  const addReading = () => {
    if (newIndex === "" || !newDate) return;
    const alertPct = consoAlert; // capture before state resets
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const m = next.meters.find(x => x.id === meter.id);
      m.readings.push([newDate, parseFloat(newIndex), parseFloat(newRate) || 0, conso ?? 0, cost ?? 0, days ?? 0]);
      return next;
    });
    setShowForm(false);
    setNewIndex("");
    setLastAlert(alertPct !== null ? { pct: alertPct, date: newDate } : null);
  };

  const deleteReading = (index) => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const m = next.meters.find(x => x.id === meter.id);
      const removed = m.readings[index];
      m.readings.splice(index, 1);
      // If a reading after the removed one still exists, recompute its
      // conso/cost/days against the new previous reading (or zero them out
      // if the removed reading was the first one).
      if (m.readings[index]) {
        const newPrev = m.readings[index - 1]; // may be undefined if index===0
        const cur = m.readings[index];
        if (newPrev) {
          const newConso = cur[1] - newPrev[1];
          const newDays = daysBetween(newPrev[0], cur[0]);
          cur[3] = newConso;
          cur[4] = newConso * (cur[2] || 0);
          cur[5] = newDays;
        } else {
          // now the first reading: no consumption can be derived
          cur[3] = 0; cur[4] = 0; cur[5] = 0;
        }
      }
      return next;
    });
  };

  const Icon = TYPE_ICON[meter.type] || Gauge;

  return (
    <div>
      <button className="btn btn-ghost" onClick={onBack} style={{ marginBottom: 10 }}>
        <ArrowLeft size={15} /> Retour
      </button>
      <div className="card">
        <div className="row" style={{ marginBottom: 6 }}>
          <Icon size={20} color={TYPE_COLOR[meter.type]} />
          <div style={{ fontWeight: 700 }}>{meter.label}{meter.subtype ? ` (${meter.subtype})` : ""}</div>
        </div>
        <div style={{ marginBottom: 10 }}>
          <span className="label">Index actuel</span>
          <MeterDigits value={last ? fmtNum(last[1], 1) : "—"} />
        </div>
        <EvolutionChart readings={meter.readings} dataKey="cost" color={TYPE_COLOR[meter.type]} unitLabel={meter.type === "eau" ? "m³" : "kWh"} />
        <div style={{ marginTop: 8 }}>
          <EvolutionChart readings={meter.readings} dataKey="conso" color={INK_LIGHT} unitLabel={meter.type === "eau" ? "m³" : "kWh"} />
        </div>
      </div>

      <div className="card">
        <div className="between">
          <div style={{ fontWeight: 700 }}>Historique des relevés ({meter.readings.length})</div>
          <button className="btn btn-accent" onClick={() => setShowForm(v => !v)}>
            <Plus size={14} /> Relevé
          </button>
        </div>

        {showForm && (
          <div style={{ marginTop: 12, padding: 10, background: PAPER, borderRadius: 10 }}>
            <div style={{ marginBottom: 8 }}>
              <span className="label">Date</span>
              <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} />
            </div>
            <div style={{ marginBottom: 8 }}>
              <span className="label">Nouvel index</span>
              <input type="number" step="0.01" value={newIndex} onChange={e => setNewIndex(e.target.value)} placeholder={last ? `> ${last[1]}` : ""} />
            </div>
            <div style={{ marginBottom: 8 }}>
              <span className="label">Tarif (€ / {meter.type === "eau" ? "m³" : "kWh ou unité"})</span>
              <input type="number" step="0.0001" value={newRate} onChange={e => setNewRate(e.target.value)} />
            </div>
            <div style={{ fontSize: 13, color: MUTED, marginBottom: 8 }}>
              Consommation : <b>{conso !== null ? fmtNum(conso, 1) : "—"}</b> · Jours : <b>{days ?? "—"}</b> · Coût : <b>{cost !== null ? fmtEUR(cost) : "—"}</b>
            </div>
            {consoAlert !== null && (
              <div style={{ fontSize: 13, fontWeight: 700, color: RED, marginBottom: 8, padding: 8, background: "#fdecec", borderRadius: 8 }}>
                ⚠️ Consommation {consoAlert > 0 ? "en hausse" : "en baisse"} de {fmtNum(Math.abs(consoAlert), 0)}% par rapport à la période précédente (comparaison ramenée au nombre de jours).
              </div>
            )}
            <button className="btn btn-primary" onClick={addReading}><Save size={14} /> Enregistrer le relevé</button>
          </div>
        )}

        {lastAlert && (
          <div style={{ fontSize: 13, fontWeight: 700, color: RED, marginTop: 10, padding: 10, background: "#fdecec", borderRadius: 8 }}>
            ⚠️ Relevé du {fmtDate(lastAlert.date)} enregistré — consommation {lastAlert.pct > 0 ? "en hausse" : "en baisse"} de {fmtNum(Math.abs(lastAlert.pct), 0)}% par rapport à la période précédente.
            <button className="btn btn-ghost" style={{ marginLeft: 8, padding: "2px 8px", fontSize: 12 }} onClick={() => setLastAlert(null)}>OK</button>
          </div>
        )}

        <div className="scrollx" style={{ marginTop: 10 }}>
          <table className="tbl">
            <thead><tr><th></th><th>Date</th><th>Index</th><th>Tarif</th><th>Conso.</th><th>Coût</th><th>Jours</th></tr></thead>
            <tbody>
              {meter.readings.slice().reverse().map((r, i) => {
                const realIndex = meter.readings.length - 1 - i;
                return (
                  <tr key={i}>
                    <td style={{ textAlign: "left", padding: "6px 2px" }}>
                      <button className="btn btn-ghost" style={{ padding: "4px 6px", color: RED }}
                        onClick={() => {
                          if (window.confirm(`Supprimer le relevé du ${fmtDate(r[0])} (index ${fmtNum(r[1], 1)}) ?`)) {
                            deleteReading(realIndex);
                          }
                        }}>
                        <X size={13} />
                      </button>
                    </td>
                    <td>{fmtDate(r[0])}</td>
                    <td>{fmtNum(r[1], 1)}</td>
                    <td>{r[2] ? fmtNum(r[2], 3) : "—"}</td>
                    <td>{fmtNum(r[3], 1)}</td>
                    <td>{fmtEUR(r[4])}</td>
                    <td>{r[5]}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   DECOMPTES VIEW
   ============================================================ */
function DecomptesView({ data, setData, building }) {
  const b = data.buildings.find(x => x.id === building);
  const [unitId, setUnitId] = useState(b.units[0]?.id);
  const unit = b.units.find(x => x.id === unitId);

  // All hooks must run unconditionally on every render (React rule), so they
  // are declared here, before any early return for special unit types
  // (e.g. RDC Commercial / privateMeterOnly).
  const [mazoutCost, setMazoutCost] = useState(0);
  const [istaCost, setIstaCost] = useState(0);
  const [provisionOverride, setProvisionOverride] = useState(null);
  const [preview, setPreview] = useState(null);
  const [periodFromOverride, setPeriodFromOverride] = useState(null);
  const [periodToOverride, setPeriodToOverride] = useState(null);

  useEffect(() => {
    if (!b.units.find(x => x.id === unitId)) setUnitId(b.units[0]?.id);
  }, [building]);

  if (!unit) return null;

  if (unit.privateMeterOnly) {
    return (
      <div>
        <div className="card">
          <span className="label">Logement</span>
          <select value={unitId} onChange={e => setUnitId(e.target.value)}>
            {b.units.map(u => <option key={u.id} value={u.id}>{u.name} — {u.tenant || "Vacant"}</option>)}
          </select>
        </div>
        <div className="card">
          <div style={{ fontWeight: 700, marginBottom: 6 }}>{unit.name} — compteur privé</div>
          <div style={{ fontSize: 13, color: MUTED }}>
            Ce logement dispose de son propre compteur électrique indépendant et n'est pas inclus dans les
            décomptes de charges communes (eau, chauffage, nettoyage). Aucun calcul n'est effectué ici.
          </div>
        </div>
      </div>
    );
  }

  const elecMeters = unitMeters(data.meters, building, unitId);
  const eauMeters = elecMeters.filter(m => m.type === "eau");
  const elecOnly = elecMeters.filter(m => m.type === "elec");
  const ista = (data.ista || []).find(i => i.building === building && i.unit === unitId);

  const elecInterval = elecOnly.length ? elecOnly.map(m => lastInterval(m.readings)).filter(Boolean) : [];
  const eauInterval = eauMeters.length ? eauMeters.map(m => lastInterval(m.readings)).filter(Boolean) : [];

  const elecConsoRaw = elecInterval.reduce((s, i) => s + i.conso, 0);
  const eauConsoRaw = eauInterval.reduce((s, i) => s + i.conso, 0);

  // Décomptes are billed at the "Tarifs — Étudiants" rates, not the
  // historical fixed cost stored with each meter reading.
  const studentTariffs = data.tariffs?.[building] || deriveTariffs(data.meters, building);
  const elecCostRaw = elecConsoRaw * (studentTariffs.studentElec || 0);
  const eauCostRaw = eauConsoRaw * (studentTariffs.studentEau || 0);

  const elecAdj = getAdjustment(data, building, "elec");
  const eauAdj = getAdjustment(data, building, "eau");
  let elecConso = elecAdj.mode === "conso" ? elecConsoRaw * elecAdj.factor : elecConsoRaw;
  let elecCost = elecAdj.mode !== "none" ? elecCostRaw * elecAdj.factor : elecCostRaw;
  let eauConso = eauAdj.mode === "conso" ? eauConsoRaw * eauAdj.factor : eauConsoRaw;
  let eauCost = eauAdj.mode !== "none" ? eauCostRaw * eauAdj.factor : eauCostRaw;

  // Appart 1er / Duplex (PTG): no individual electricity meter — forced to 0.
  if (unit.elecOverrideZero) {
    elecConso = 0;
    elecCost = 0;
  }

  // Studios 5-10 (PTG): shared cold-water passage meter, split 6 ways.
  let sharedWaterConso = 0, sharedWaterCost = 0, sharedWaterInterval = null;
  if (unit.sharedWaterPassage) {
    const sharedMeter = data.meters.find(m => m.id === unit.sharedWaterPassage);
    if (sharedMeter) {
      sharedWaterInterval = lastInterval(sharedMeter.readings);
      if (sharedWaterInterval) {
        sharedWaterConso = sharedWaterInterval.conso / unit.sharedWaterDivisor;
        sharedWaterCost = sharedWaterConso * (studentTariffs.studentEau || 0);
      }
    }
  }
  eauConso += sharedWaterConso;
  eauCost += sharedWaterCost;

  const periodToDefault = (elecInterval[0]?.toDate) || (eauInterval[0]?.toDate) || todayISO();
  const periodFromDefault = (elecInterval[0]?.fromDate) || (eauInterval[0]?.fromDate) || (() => {
    const d = new Date(periodToDefault);
    d.setDate(d.getDate() - 365);
    return d.toISOString().slice(0, 10);
  })();
  const periodFrom = periodFromOverride || periodFromDefault;
  const periodTo = periodToOverride || periodToDefault;

  const days = Math.max(daysBetween(periodFrom, periodTo), 1);

  const months = days / 30.44; // continuous, for accurate partial-period provisions
  const monthsDisplay = Math.round(months * 10) / 10;
  const provision = provisionOverride !== null ? provisionOverride : Math.round((unit.provisionMonthly || 0) * months * 100) / 100;

  // Cleaning fee: 10 EUR per whole month (a month started counts in full,
  // even for a tenant leaving early in the month) — distinct from the
  // proportional provision calculation above.
  const cleaningMonths = Math.max(1, Math.ceil(months));
  const cleaningCost = (unit.cleaningMonthly || 0) * cleaningMonths;
  eauCost += cleaningCost;

  const skipHeatingRow = building === "biche";
  const firstLineCost = skipHeatingRow ? 0 : (unit.hasIsta ? istaCost : mazoutCost);
  const total = firstLineCost + elecCost + eauCost;
  const diff = provision - total;

  const archives = (data.archives?.[building]?.[unitId]) || [];

  const archive = () => {
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next.archives) next.archives = {};
      if (!next.archives[building]) next.archives[building] = {};
      if (!next.archives[building][unitId]) next.archives[building][unitId] = [];
      next.archives[building][unitId].push({
        tenant: unit.tenant, from: periodFrom, to: periodTo,
        mazout: { cost: firstLineCost, isIsta: !!unit.hasIsta },
        elec: { conso: elecConso, cost: elecCost, days },
        eau: { conso: eauConso, cost: eauCost, days },
        total, provision, diff, days, createdAt: todayISO(),
      });
      return next;
    });
  };

  const buildLines = (m, e, w, isIsta, skipHeatingRow) => {
    const heatingRow = { label: isIsta ? "Chauffage / Eau chaude" : "Mazout / Chauffage (quote-part)", conso: isIsta ? "ISTA" : "—", cost: fmtNum(m, 2), days: days };
    const rows = [
      { label: "Électricité", conso: fmtNum(e.conso, 1), cost: fmtNum(e.cost, 2), days: e.days || days },
      { label: "Eau / Nettoyage", conso: fmtNum(w.conso, 1), cost: fmtNum(w.cost, 2), days: w.days || days,
        totalCell: fmtNum(total, 2), provCell: fmtNum(provision, 2), diffCell: (diff < 0 ? "-" : "") + fmtNum(Math.abs(diff), 2) },
    ];
    return skipHeatingRow ? rows : [heatingRow, ...rows];
  };

  const periodLabel = `${fmtDate(periodFrom)} - ${fmtDate(periodTo)}`;

  const openCurrentPreview = () => {
    setPreview({
      b, unit, tenant: unit.tenant || "Locataire", period: periodLabel,
      lines: buildLines(firstLineCost, { conso: elecConso, cost: elecCost, days }, { conso: eauConso, cost: eauCost, days }, unit.hasIsta, skipHeatingRow),
      totals: { diff },
    });
  };

  const openArchivedPreview = (a) => {
    const periodLbl = `${fmtDate(a.from)} - ${fmtDate(a.to)}`;
    const lines = buildLines(a.mazout.cost, a.elec, a.eau, a.mazout.isIsta, skipHeatingRow);
    const lastIdx = lines.length - 1;
    setPreview({
      b, unit, tenant: a.tenant || "Locataire", period: periodLbl,
      lines: lines.map((l, i) => i === lastIdx ? { ...l,
        totalCell: fmtNum(a.total, 2), provCell: fmtNum(a.provision, 2),
        diffCell: (a.diff < 0 ? "-" : "") + fmtNum(Math.abs(a.diff), 2) } : l),
      totals: { diff: a.diff },
    });
  };

  if (preview) {
    return (
      <DecomptePreview
        b={preview.b} unit={preview.unit} tenant={preview.tenant} period={preview.period}
        lines={preview.lines} totals={preview.totals}
        onClose={() => setPreview(null)}
        onShareDoc={() => shareDecompteDoc(preview.b.name, preview.unit.name, preview.tenant, preview.period, preview.lines, preview.totals)}
        onDownloadDoc={() => downloadDecompteDoc(preview.b.name, preview.unit.name, preview.tenant, preview.period, preview.lines, preview.totals)}
      />
    );
  }

  return (
    <div>
      <div className="card">
        <span className="label">Logement</span>
        <select value={unitId} onChange={e => { setUnitId(e.target.value); setProvisionOverride(null); setMazoutCost(0); setIstaCost(0); setPeriodFromOverride(null); setPeriodToOverride(null); }}>
          {b.units.map(u => <option key={u.id} value={u.id}>{u.name} — {u.tenant || "Vacant"}</option>)}
        </select>
      </div>

      <div className="card">
        <div style={{ fontWeight: 700, marginBottom: 4 }}>Période en cours</div>
        <div style={{ fontSize: 13, color: MUTED, marginBottom: 10 }}>{periodLabel} ({days} jours) — {unit.tenant || "Vacant"}</div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
          <div>
            <span className="label">Début de période</span>
            <input type="date" value={periodFrom} onChange={e => setPeriodFromOverride(e.target.value || null)} />
          </div>
          <div>
            <span className="label">Fin de période</span>
            <input type="date" value={periodTo} onChange={e => setPeriodToOverride(e.target.value || null)} />
          </div>
        </div>
        {(periodFromOverride || periodToOverride) && (
          <div style={{ fontSize: 12, color: ACCENT, marginBottom: 10 }}>
            Période modifiée manuellement — {fmtNum(monthsDisplay, 1)} mois (provision et nettoyage recalculés).{" "}
            <button className="btn btn-ghost" style={{ padding: "2px 8px", fontSize: 12 }} onClick={() => { setPeriodFromOverride(null); setPeriodToOverride(null); }}>
              Réinitialiser
            </button>
          </div>
        )}

        <div className="scrollx">
          <table className="tbl">
            <thead><tr><th></th><th>Conso.</th><th>Coût</th></tr></thead>
            <tbody>
              {!skipHeatingRow && (
                <tr>
                  <td>{unit.hasIsta ? "Chauffage / Eau chaude" : "Mazout / Chauffage (quote-part)"}</td>
                  <td>{unit.hasIsta ? "ISTA" : "—"}</td>
                  <td><input type="number" step="0.01" value={(unit.hasIsta ? istaCost : mazoutCost) || ""} placeholder="0" onChange={e => (unit.hasIsta ? setIstaCost : setMazoutCost)(parseFloat(e.target.value) || 0)} style={{ width: 90, textAlign: "right" }} /></td>
                </tr>
              )}
              <tr><td>Électricité{elecAdj.mode !== "none" ? " *" : ""}{unit.elecOverrideZero ? " (n/a)" : ""}</td><td>{fmtNum(elecConso, 1)} kWh</td><td>{fmtEUR(elecCost)}</td></tr>
              <tr><td>Eau / Nettoyage{eauAdj.mode !== "none" ? " *" : ""}</td><td>{fmtNum(eauConso, 1)} m³</td><td>{fmtEUR(eauCost)}</td></tr>
              {unit.sharedWaterPassage && (
                <tr style={{ fontSize: 12, color: MUTED }}>
                  <td>↳ dont eau froide (compteur passage ÷6)</td>
                  <td>{fmtNum(sharedWaterConso, 1)} m³</td>
                  <td>{fmtEUR(sharedWaterCost)}</td>
                </tr>
              )}
              <tr style={{ fontSize: 12, color: MUTED }}>
                <td>↳ dont nettoyage ({cleaningMonths} mois × {fmtEUR(unit.cleaningMonthly)})</td>
                <td>—</td>
                <td>{fmtEUR(cleaningCost)}</td>
              </tr>
            </tbody>
          </table>
        </div>

        {(elecAdj.mode !== "none" || eauAdj.mode !== "none") && (
          <div style={{ fontSize: 12, color: ACCENT, marginTop: 6 }}>
            * Valeur ajustée (voir Compteurs → Bilan) pour correspondre au compteur général de l'immeuble.
          </div>
        )}

        {elecInterval.length === 0 && eauInterval.length === 0 && !unit.elecOverrideZero && (
          <div style={{ fontSize: 12, color: ACCENT, marginTop: 8, padding: 8, background: PAPER, borderRadius: 8 }}>
            Ce logement n'a pas de compteur individuel électricité/eau. La période ci-dessus est calée sur 1 an par défaut
            ({fmtNum(monthsDisplay, 1)} mois) — ajustez les dates en modifiant la provision ou la quote-part mazout/chauffage
            manuellement{ista ? ", ou basez-vous sur les factures ISTA ci-dessous." : "."}
          </div>
        )}

        {ista && (
          <div style={{ fontSize: 12, color: MUTED, marginTop: 8 }}>
            Pour référence — dernière facture ISTA reçue : {fmtEUR(ista.invoices[ista.invoices.length - 1][1])} le {fmtDate(ista.invoices[ista.invoices.length - 1][0])}.
            Reportez le montant correspondant à la période ci-dessus dans le champ "dont ISTA" du tableau.
          </div>
        )}

        <div style={{ marginTop: 12 }}>
          <span className="label">Provision de charges (≈ {fmtNum(monthsDisplay, 1)} mois × {fmtEUR(unit.provisionMonthly)})</span>
          <input type="number" step="0.01" value={provision || ""} placeholder="0" onChange={e => setProvisionOverride(parseFloat(e.target.value) || 0)} />
        </div>

        <div className="card" style={{ marginTop: 12, background: PAPER, border: "none" }}>
          <div className="between">
            <div>Total des charges</div>
            <MeterDigits value={fmtEUR(total)} />
          </div>
          <div className="between" style={{ marginTop: 6 }}>
            <div>Différence</div>
            <MeterDigits value={(diff < 0 ? "-" : "") + fmtEUR(Math.abs(diff))} cls={diff < 0 ? "red" : ""} />
          </div>
        </div>

        <div className="row" style={{ marginTop: 12 }}>
          <button className="btn btn-primary" onClick={openCurrentPreview}><FileText size={14} /> Voir le décompte</button>
          <button className="btn btn-accent" onClick={archive}><Save size={14} /> Archiver cette période</button>
        </div>
      </div>

      <div className="card">
        <div style={{ fontWeight: 700, marginBottom: 8 }}>
          <HistoryIcon size={14} style={{ verticalAlign: -2, marginRight: 4 }} />
          Archives ({archives.length})
        </div>
        {archives.length === 0 && <div style={{ fontSize: 13, color: MUTED }}>Aucune période archivée pour ce logement.</div>}
        {archives.slice().reverse().map((a, i) => {
          const realIndex = archives.length - 1 - i;
          return (
            <div key={i} className="between" style={{ padding: "8px 0", borderTop: `1px solid ${LINE}` }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{fmtDate(a.from)} → {fmtDate(a.to)}</div>
                <div style={{ fontSize: 12, color: MUTED }}>{a.tenant} · Total {fmtEUR(a.total)} · Diff. <span style={{ color: a.diff < 0 ? RED : TEXT, fontWeight: 700 }}>{(a.diff < 0 ? "-" : "") + fmtEUR(Math.abs(a.diff))}</span></div>
              </div>
              <div className="row" style={{ gap: 6 }}>
                <button className="btn btn-ghost" onClick={() => openArchivedPreview(a)}><FileText size={14} /></button>
                <button className="btn btn-ghost" style={{ color: RED }} onClick={() => {
                  if (window.confirm(`Supprimer l'archive du ${fmtDate(a.from)} → ${fmtDate(a.to)} (${a.tenant}) ?`)) {
                    setData(prev => {
                      const next = JSON.parse(JSON.stringify(prev));
                      next.archives[building][unitId].splice(realIndex, 1);
                      return next;
                    });
                  }
                }}><X size={14} /></button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   SEARCH VIEW
   ============================================================ */
function SearchView({ data, onGo }) {
  const [q, setQ] = useState("");
  const results = useMemo(() => {
    const term = q.trim().toLowerCase();
    const out = [];
    data.buildings.forEach(b => {
      b.units.forEach(u => {
        const names = [u.tenant, ...(u.history || []).map(h => h.tenant)].filter(Boolean);
        const archives = (data.archives?.[b.id]?.[u.id]) || [];
        archives.forEach(a => names.push(a.tenant));
        const haystack = [b.name, u.name, ...names].join(" ").toLowerCase();
        if (term === "" || haystack.includes(term)) {
          out.push({ building: b, unit: u, names: [...new Set(names)] });
        }
      });
    });
    return out;
  }, [q, data]);

  return (
    <div>
      <div className="card">
        <input placeholder="Rechercher un immeuble, un logement ou un locataire…" value={q} onChange={e => setQ(e.target.value)} />
      </div>
      {results.map(r => (
        <div className="card" key={r.building.id + r.unit.id}>
          <div className="between">
            <div>
              <div style={{ fontWeight: 700 }}>{r.unit.name} <span style={{ color: MUTED, fontWeight: 400 }}>· {r.building.name}</span></div>
              <div style={{ fontSize: 13, color: MUTED }}>
                {r.names.length ? r.names.join(", ") : "Aucun locataire enregistré"}
              </div>
            </div>
          </div>
          <div className="row" style={{ marginTop: 8 }}>
            <button className="btn btn-ghost" onClick={() => onGo(r.building.id, "buildings")}>Logement</button>
            <button className="btn btn-ghost" onClick={() => onGo(r.building.id, "meters")}>Compteurs</button>
            <button className="btn btn-ghost" onClick={() => onGo(r.building.id, "decomptes")}>Décomptes</button>
          </div>
        </div>
      ))}
      {results.length === 0 && <div style={{ fontSize: 13, color: MUTED, textAlign: "center", marginTop: 30 }}>Aucun résultat.</div>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
